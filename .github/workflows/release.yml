name: release

on:
  workflow_dispatch:
    inputs:
      preview:
        description: "Preview tag if not empty. Needs to be in format vX.Y.Z-preview.X"
        type: string
  pull_request:
    types: [closed]
    branches:
      - main
      - "release/**"

env:
  RUST_VERSION: 1.89.0
  CARGO_TERM_COLOR: always
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  prepare:
    # The prepare-release branch names comes from the release-dispatch.yml workflow.
    if: (github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'prepare-release') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      source_date_epoch: ${{ steps.release_info.outputs.source_date_epoch }}
      tag_name: ${{ steps.release_info.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: release_info
        run: |
          if [[ "${{ github.event.inputs.preview || 'false' }}" != "false" ]]; then
            # check if valid
            if [[ ! "${{ github.event.inputs.preview }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-preview\.[0-9]+$ ]]; then
              echo "Invalid preview tag format. Needs to be in format vX.Y.Z-preview.X"
              exit 1
            fi
            echo "tag_name=${{ github.event.inputs.preview }}" >> $GITHUB_OUTPUT
          else
            cargo install cargo-get
            echo "tag_name=v$(cargo get workspace.package.version)" >> $GITHUB_OUTPUT
          fi
          echo "source_date_epoch=$(git log -1 --format=%ct)" >> $GITHUB_OUTPUT

  build-contracts:
    runs-on: ubuntu-latest
    needs: prepare
    container:
      image: ghcr.io/dojoengine/katana-dev:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build contracts
        run: make contracts

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-artifacts
          path: ./crates/contracts/build
          retention-days: 1

  release:
    name: ${{ matrix.job.target }} (${{ matrix.job.os }}${{ matrix.job.native_build == true && ', native' || '' }})
    needs: [prepare, build-contracts]
    runs-on: ${{ matrix.job.os }}
    env:
      PLATFORM_NAME: ${{ matrix.job.platform }}
      TARGET: ${{ matrix.job.target }}
      ARCH: ${{ matrix.job.arch }}
      NATIVE_BUILD: ${{ matrix.job.native_build }}
    strategy:
      matrix:
        job:
          # The OS is used for the runner
          # The platform is a generic platform name
          # The target is used by Cargo
          # The arch is either 386, arm64 or amd64
          # The svm target platform to use for the binary https://github.com/roynalnaruto/svm-rs/blob/84cbe0ac705becabdc13168bae28a45ad2299749/svm-builds/build.rs#L4-L24
          # Added native_build dimension to control build type
          - os: ubuntu-latest-8-cores
            platform: linux
            target: x86_64-unknown-linux-gnu
            arch: amd64
            native_build: true
          - os: ubuntu-latest-8-cores-arm64
            platform: linux
            target: aarch64-unknown-linux-gnu
            arch: arm64
            svm_target_platform: linux-aarch64
            native_build: true
          - os: ubuntu-latest-8-cores-arm64
            platform: linux
            target: aarch64-unknown-linux-gnu
            arch: arm64
            svm_target_platform: linux-aarch64
            native_build: false
          - os: macos-latest-xlarge
            platform: darwin
            target: aarch64-apple-darwin
            arch: arm64
            native_build: true
          - os: macos-latest-xlarge
            platform: darwin
            target: aarch64-apple-darwin
            arch: arm64
            native_build: false
          - os: windows-2025
            platform: win32
            target: x86_64-pc-windows-msvc
            arch: amd64
            native_build: false

    steps:
      - uses: actions/checkout@v4

      - name: Download contract artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-artifacts
          path: ./crates/contracts/build

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        name: Rust Toolchain Setup
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: ${{ matrix.job.target }}
          cache-on-failure: true
          cache-key: ${{ matrix.job.target }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install LLVM ( Linux )
        if: ${{ matrix.job.platform == 'linux' && matrix.job.native_build == true }}
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19
          sudo apt-get update -y
          sudo apt-get install -y g++ llvm-19 llvm-19-dev llvm-19-runtime clang-19 clang-tools-19 lld-19 libpolly-19-dev libmlir-19-dev mlir-19-tools
          echo "MLIR_SYS_190_PREFIX=/usr/lib/llvm-19" >> $GITHUB_ENV
          echo "LLVM_SYS_191_PREFIX=/usr/lib/llvm-19" >> $GITHUB_ENV
          echo "TABLEGEN_190_PREFIX=/usr/lib/llvm-19" >> $GITHUB_ENV

      - name: Install LLVM ( macOS )
        if: ${{ matrix.job.platform == 'darwin' && matrix.job.native_build == true }}
        run: |
          brew install llvm@19 --quiet
          brew install zstd
          echo "MLIR_SYS_190_PREFIX=$(brew --prefix llvm@19)" >> $GITHUB_ENV
          echo "LLVM_SYS_191_PREFIX=$(brew --prefix llvm@19)" >> $GITHUB_ENV
          echo "TABLEGEN_190_PREFIX=$(brew --prefix llvm@19)" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$(brew --prefix zstd)/lib:$LIBRARY_PATH" >> $GITHUB_ENV
          echo "CPATH=$(brew --prefix zstd)/include:$CPATH" >> $GITHUB_ENV

      # - name: Install LLVM ( Windows )
      #   if: ${{ matrix.job.platform == 'win32' && matrix.job.native_build == true }}
      #   run: |
      #     $llvmUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.7/clang+llvm-19.1.7-x86_64-pc-windows-msvc.tar.xz"
      #     $llvmDir = "C:\Program Files (x86)\LLVM"
      #     $llvmDirBin = "C:\Program Files (x86)\LLVM\bin"
      #
      #     Write-Host "Downloading LLVM from $llvmUrl"
      #     Invoke-WebRequest -Uri $llvmUrl -OutFile llvm.tar.xz
      #
      #     Write-Host "Creating LLVM directory"
      #     New-Item -ItemType Directory -Path $llvmDir -Force
      #
      #     Write-Host "Extracting LLVM"
      #     tar -xf llvm.tar.xz -C $llvmDir --strip-components=1
      #
      #     Write-Host "LLVM installed successfully to $llvmDir"
      #
      #     Write-Host "Listing files in LLVM directory"
      #     Get-ChildItem -Path "$llvmDirBin" | ForEach-Object { Write-Host $_.Name }

      # # On Windows, use powershell syntax to write the env var to the file.
      # # https://github.com/actions/runner/issues/1636#issuecomment-1024531638
      # - name: Set cairo-native LLVM environment variables ( Windows )
      #   if: ${{ matrix.job.platform == 'win32' && matrix.job.native_build == true }}
      #   run: |
      #     echo "MLIR_SYS_190_PREFIX=C:\Program Files (x86)\LLVM" | Out-File -FilePath $env:GITHUB_ENV -Append
      #     echo "LLVM_SYS_191_PREFIX=C:\Program Files (x86)\LLVM" | Out-File -FilePath $env:GITHUB_ENV -Append
      #     echo "TABLEGEN_190_PREFIX=C:\Program Files (x86)\LLVM" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Apple M1 setup
        if: ${{ matrix.job.target == 'aarch64-apple-darwin' }}
        run: |
          echo "SDKROOT=$(xcrun -sdk macosx --show-sdk-path)" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=$(xcrun -sdk macosx --show-sdk-platform-version)" >> $GITHUB_ENV

      - name: Linux ARM setup
        if: ${{ matrix.job.target == 'aarch64-unknown-linux-gnu' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev
          # We build jemalloc with 64KB pagesize so that it works for all linux/arm64 pagesize variants
          # See: https://github.com/jemalloc/jemalloc/issues/467
          echo "JEMALLOC_SYS_WITH_LG_PAGE=16" >> $GITHUB_ENV

      # katana-grpc's build script invokes tonic-build, which requires protoc.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binary
        if: ${{ matrix.job.native_build == false }}
        shell: bash
        run: |
          cargo build -p katana --bin katana --profile performance --target ${{ matrix.job.target }}

      - name: Build binary ( w/ cairo-native )
        if: ${{ matrix.job.native_build == true }}
        shell: bash
        run: |
          cargo build -p katana --bin katana --profile performance --features native --target ${{ matrix.job.target }}

      - name: Archive binaries
        id: artifacts
        env:
          VERSION_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          if [ "$NATIVE_BUILD" == "true" ]; then
            SUFFIX="_native"
          else
            SUFFIX=""
          fi

          if [ "$PLATFORM_NAME" == "linux" ]; then
            tar -czvf "katana_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}${SUFFIX}.tar.gz" -C ./target/${TARGET}/performance katana
            echo "file_name=katana_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}${SUFFIX}.tar.gz" >> $GITHUB_OUTPUT
          elif [ "$PLATFORM_NAME" == "darwin" ]; then
            # We need to use gtar here otherwise the archive is corrupt.
            # See: https://github.com/actions/virtual-environments/issues/2619
            gtar -czvf "katana_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}${SUFFIX}.tar.gz" -C ./target/${TARGET}/performance katana
            echo "file_name=katana_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}${SUFFIX}.tar.gz" >> $GITHUB_OUTPUT
          elif [ "$PLATFORM_NAME" == "win32" ]; then
            cd ./target/${TARGET}/performance
            7z a -tzip "katana_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}${SUFFIX}.zip" katana.exe
            mv "katana_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}${SUFFIX}.zip" ../../../
            echo "file_name=katana_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}${SUFFIX}.zip" >> $GITHUB_OUTPUT
          fi
        shell: bash

      # We move binaries so they match $TARGETPLATFORM in the Docker build
      # Only move native binaries for Docker (we want the native version for Docker)
      - name: Move binaries for Docker
        if: ${{ env.PLATFORM_NAME == 'linux' && matrix.job.native_build == true }}
        shell: bash
        run: |
          mkdir -p $PLATFORM_NAME/$ARCH
          mv target/${TARGET}/performance/katana $PLATFORM_NAME/$ARCH

      - name: Upload Docker binaries
        if: ${{ env.PLATFORM_NAME == 'linux' && matrix.job.native_build == true }}
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.job.target }}
          path: ${{ env.PLATFORM_NAME }}
          retention-days: 1

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.job.target }}${{ matrix.job.native_build == true && '-native' || '' }}
          path: ${{ steps.artifacts.outputs.file_name }}
          retention-days: 1

  release-reproducible-linux-amd64:
    name: x86_64-unknown-linux-gnu (ubuntu-latest-8-cores, reproducible)
    needs: [prepare, build-contracts]
    runs-on: ubuntu-latest-8-cores
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download contract artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-artifacts
          path: ./crates/contracts/build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build reproducible release artifact
        id: artifacts
        shell: bash
        env:
          SOURCE_DATE_EPOCH: ${{ needs.prepare.outputs.source_date_epoch }}
          VERSION_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          set -euo pipefail

          ./scripts/build-reproducible-katana.sh \
            --version "$VERSION_NAME" \
            --source-date-epoch "$SOURCE_DATE_EPOCH" \
            --output-dir dist/reproducible-katana

          source dist/reproducible-katana/manifest.env
          echo "file_name=dist/reproducible-katana/${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ./dist/reproducible-katana/katana
            ./dist/reproducible-katana/*.tar.gz

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-x86_64-unknown-linux-gnu
          path: ${{ steps.artifacts.outputs.file_name }}
          retention-days: 1

      - name: Summary
        shell: bash
        env:
          VERSION_NAME: ${{ needs.prepare.outputs.tag_name }}
          SOURCE_DATE_EPOCH: ${{ needs.prepare.outputs.source_date_epoch }}
        run: |
          set -euo pipefail
          source dist/reproducible-katana/manifest.env
          GLIBC_BUILD_VERSION="$(grep '^GLIBC_BUILD_VERSION=' dist/reproducible-katana/build-info.txt | cut -d= -f2-)"
          GLIBC_MIN_REQUIRED="$(grep '^GLIBC_MIN_REQUIRED=' dist/reproducible-katana/build-info.txt | cut -d= -f2-)"
          {
            echo "## Reproducible Katana Linux amd64"
            echo ""
            echo "**Version:** ${VERSION_NAME}"
            echo "**SOURCE_DATE_EPOCH:** ${SOURCE_DATE_EPOCH}"
            echo "**Binary SHA-256:** \`${BINARY_SHA256}\`"
            echo "**Binary SHA-384:** \`${BINARY_SHA384}\`"
            echo "**glibc (build env):** ${GLIBC_BUILD_VERSION}"
            echo "**glibc (binary requires ≥):** ${GLIBC_MIN_REQUIRED}"
          } >> "$GITHUB_STEP_SUMMARY"

  build-sidecars:
    name: sidecar-${{ matrix.sidecar }}-${{ matrix.job.target }}
    needs: [prepare]
    runs-on: ${{ matrix.job.os }}
    env:
      PLATFORM_NAME: ${{ matrix.job.platform }}
      ARCH: ${{ matrix.job.arch }}
    strategy:
      matrix:
        sidecar: [paymaster-service, vrf-server]
        job:
          - os: ubuntu-latest-8-cores
            platform: linux
            target: x86_64-unknown-linux-gnu
            arch: amd64
          - os: ubuntu-latest-8-cores-arm64
            platform: linux
            target: aarch64-unknown-linux-gnu
            arch: arm64
          - os: macos-latest-xlarge
            platform: darwin
            target: aarch64-apple-darwin
            arch: arm64
          - os: windows-2025
            platform: win32
            target: x86_64-pc-windows-msvc
            arch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        name: Rust Toolchain Setup
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: ${{ matrix.job.target }}
          cache-on-failure: true
          cache-key: sidecar-${{ matrix.job.target }}
          # Building third-party crates; don't fail their builds on rustc
          # warnings (default is `-D warnings`).
          rustflags: ""

      - name: Read sidecar versions
        id: sidecar_versions
        shell: bash
        run: |
          # Parse the sidecar-versions.toml for the current sidecar
          SIDECAR="${{ matrix.sidecar }}"
          REPO=$(grep -A3 "\[${SIDECAR}\]" sidecar-versions.toml | grep 'repo' | sed 's/.*= *"\(.*\)".*/\1/')
          REV=$(grep -A3 "\[${SIDECAR}\]" sidecar-versions.toml | grep 'rev' | sed 's/.*= *"\(.*\)".*/\1/')
          PACKAGE=$(grep -A3 "\[${SIDECAR}\]" sidecar-versions.toml | grep 'package' | sed 's/.*= *"\(.*\)".*/\1/')
          echo "repo=${REPO}" >> $GITHUB_OUTPUT
          echo "rev=${REV}" >> $GITHUB_OUTPUT
          echo "package=${PACKAGE}" >> $GITHUB_OUTPUT

      - name: Linux ARM setup
        if: ${{ matrix.job.target == 'aarch64-unknown-linux-gnu' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev

      - name: Apple M1 setup
        if: ${{ matrix.job.target == 'aarch64-apple-darwin' }}
        run: |
          echo "SDKROOT=$(xcrun -sdk macosx --show-sdk-path)" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=$(xcrun -sdk macosx --show-sdk-platform-version)" >> $GITHUB_ENV

      - name: Build sidecar binary
        shell: bash
        run: |
          cargo install --locked \
            --git ${{ steps.sidecar_versions.outputs.repo }} \
            --rev ${{ steps.sidecar_versions.outputs.rev }} \
            --target ${{ matrix.job.target }} \
            --root ./sidecar-out \
            ${{ steps.sidecar_versions.outputs.package }}

      - name: Archive sidecar binary
        id: artifacts
        env:
          VERSION_NAME: ${{ needs.prepare.outputs.tag_name }}
        shell: bash
        run: |
          SIDECAR="${{ matrix.sidecar }}"
          BIN_NAME="${SIDECAR}"
          if [ "$PLATFORM_NAME" == "win32" ]; then
            BIN_NAME="${SIDECAR}.exe"
          fi

          if [ "$PLATFORM_NAME" == "win32" ]; then
            cd ./sidecar-out/bin
            7z a -tzip "${SIDECAR}_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}.zip" "${BIN_NAME}"
            mv "${SIDECAR}_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}.zip" ../../
            echo "file_name=${SIDECAR}_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}.zip" >> $GITHUB_OUTPUT
          elif [ "$PLATFORM_NAME" == "darwin" ]; then
            gtar -czvf "${SIDECAR}_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}.tar.gz" -C ./sidecar-out/bin "${BIN_NAME}"
            echo "file_name=${SIDECAR}_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}.tar.gz" >> $GITHUB_OUTPUT
          else
            tar -czvf "${SIDECAR}_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}.tar.gz" -C ./sidecar-out/bin "${BIN_NAME}"
            echo "file_name=${SIDECAR}_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}.tar.gz" >> $GITHUB_OUTPUT
          fi

      - name: Upload sidecar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-sidecar-${{ matrix.sidecar }}-${{ matrix.job.target }}
          path: ${{ steps.artifacts.outputs.file_name }}
          retention-days: 1

  generate-checksums:
    runs-on: ubuntu-latest
    needs: [prepare, release, release-reproducible-linux-amd64, build-sidecars]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-checksums
          path: artifacts/checksums.txt
          retention-days: 1

  create-draft-release:
    runs-on: ubuntu-latest
    needs: [prepare, release, release-reproducible-linux-amd64, build-sidecars, generate-checksums]
    container:
      image: ghcr.io/dojoengine/katana-dev:latest
    env:
      GITHUB_USER: ${{ github.repository_owner }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: git config --global --add safe.directory "*"

      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - id: version_info
        run: |
          echo "version=v$(cargo get workspace.package.version)" >> $GITHUB_OUTPUT
      - name: Display structure of downloaded files
        run: ls -R artifacts
      - run: gh release create ${{ steps.version_info.outputs.version }} ./artifacts/* --generate-notes --draft

  docker-build-and-push:
    runs-on: ubuntu-latest-8-cores
    needs: [prepare, release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: artifacts/linux
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docker image
        if: ${{ contains(needs.prepare.outputs.tag_name, 'preview') }}
        uses: docker/build-push-action@v3
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.tag_name }}
          platforms: linux/amd64,linux/arm64
          build-contexts: |
            artifacts=artifacts

      - name: Build and push docker image
        if: ${{ !contains(needs.prepare.outputs.tag_name, 'preview') }}
        uses: docker/build-push-action@v3
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:latest,ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.tag_name }}
          platforms: linux/amd64,linux/arm64
          build-contexts: |
            artifacts=artifacts
