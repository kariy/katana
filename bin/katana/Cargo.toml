[package]
description = "A fast and lightweight local Starknet development sequencer."
edition.workspace = true
license-file.workspace = true
name = "katana"
repository.workspace = true
version.workspace = true

[dependencies]
katana-bootstrap.workspace = true
katana-chain-spec.workspace = true
katana-cli.workspace = true
katana-db = { workspace = true, features = [ "arbitrary" ] }
katana-genesis.workspace = true
katana-primitives.workspace = true
katana-provider.workspace = true
katana-rpc-types.workspace = true
katana-starknet.workspace = true
katana-utils.workspace = true

crossterm = "0.28"
ratatui = "0.29"

cairo-lang-starknet-classes.workspace = true
anyhow.workspace = true
async-trait.workspace = true
byte-unit = "5.1.4"
cainome.workspace = true
clap.workspace = true
clap_complete.workspace = true
comfy-table = "7.1.1"
const_format = "0.2.33"
indicatif = "0.17.8"
inquire = "0.7.5"
jsonrpsee = { workspace = true, features = [ "http-client" ] }
piltover.workspace = true
rand.workspace = true
shellexpand = "3.1.0"
spinoff.workspace = true
starknet.workspace = true
serde.workspace = true
strum_macros.workspace = true
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true
url.workspace = true

colored_json = { version = "5.0", optional = true }
serde_json = { workspace = true, optional = true }

[build-dependencies]
vergen = { version = "9.0.0", features = [ "build", "cargo", "emit_and_set" ] }
vergen-gitcl = { version = "1.0.0", features = [ "build", "cargo", "rustc", "si" ] }

[dev-dependencies]
arbitrary.workspace = true
assert_matches.workspace = true
proptest = "1.0"
rstest.workspace = true
similar-asserts.workspace = true
tempfile.workspace = true

[features]
default = [
	"client",
	"init-custom-settlement-chain",
	"init-slot",
	"jemalloc",
	"katana-cli/explorer",
]

client = [ "dep:colored_json", "dep:serde_json" ]
init-custom-settlement-chain = [  ]
init-slot = [  ]
jemalloc = [  ]
debug = [  ]
native = [ "katana-cli/native" ]
